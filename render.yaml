services:
  - type: web
    name: libraryy
    env: python
    buildCommand: ./build.sh
    startCommand: python -m gunicorn --bind 0.0.0.0:$PORT --chdir libra libra.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: libraryy-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_USE_TLS
        value: True
      - key: DEFAULT_FROM_EMAIL
        sync: false

databases:
  - name: libraryy-db
    plan: free
    databaseName: libra_db
    user: libra_admin
